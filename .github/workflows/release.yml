name: Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    strategy:
      matrix:
        arch:
          - { rid: android-arm64, suffix: arm64-v8a }
          - { rid: android-arm, suffix: armeabi-v7a }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 克隆 MyLibrary
        run: |
          cd ..
          git clone https://github.com/DJDQfff/MyLibrary.git MyLibrary

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet workload install android ios

      - name: 还原签名证书
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("${{ github.workspace }}\certificate.pfx", [Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}"))

      - name: 构建 Android APK (${{ matrix.arch.suffix }})
        run: |
          dotnet publish UnoApp/UnoApp/UnoApp.csproj `
            -f net10.0-android `
            -r ${{ matrix.arch.rid }} `
            -c Release `
            -p:AndroidPackageFormats=apk `
            -p:AndroidSigningKeyStore=${{ github.workspace }}\certificate.pfx `
            -p:AndroidSigningKeyPass=${{ secrets.CERTIFICATE_PASSWORD }} `
            -p:AndroidSigningStorePass=${{ secrets.CERTIFICATE_PASSWORD }} `
            -o ./publish/${{ matrix.arch.suffix }}

          $apk = Get-ChildItem ./publish/${{ matrix.arch.suffix }} -Filter "*.apk" | Select-Object -First 1
          $newName = "EroMangaBrowser_${{ matrix.arch.suffix }}-Signed.apk"
          Rename-Item $apk.FullName $newName

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ matrix.arch.suffix }}
          path: ./publish/${{ matrix.arch.suffix }}/*.apk
  build-winapp:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, x86, ARM64]
    env:
      Solution_Name: EroMangaManager.slnx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 克隆 MyLibrary
        run: |
          cd ..
          git clone https://github.com/DJDQfff/MyLibrary.git MyLibrary

      - name: 安装 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 设置 MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: 还原依赖
        run: msbuild $env:Solution_Name /t:Restore /p:Configuration=Release /p:Platform=${{ matrix.platform }}
        env:
          Configuration: Release
          Platform: ${{ matrix.platform }}

      - name: 解码证书
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}")
          $certPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath "signing-cert.pfx"
          [IO.File]::WriteAllBytes("$certPath", $pfx_cert_byte)

      - name: 构建并打包 MSIX
        run: |
          msbuild $env:Solution_Name `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:AppxBundle=Never `
            /p:GenerateAppxPackageOnBuild=true `
            /p:PackageCertificateKeyFile=${{ github.workspace }}\signing-cert.pfx `
            /p:PackageCertificatePassword=${{ secrets.CERTIFICATE_PASSWORD }} `
        env:
          Configuration: Release
          Platform: ${{ matrix.platform }}

      - name: 收集所有 MSIX 文件
        shell: pwsh
        run: |
          Write-Output "正在全盘搜索所有 MSIX 文件..."
          $allMsix = Get-ChildItem -Path "D:\a\" -Filter "*.msix" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch "^(Main|Singleton)" }

          if (!$allMsix) {
              Write-Error "❌ 构建未生成任何 MSIX 文件"
              exit 1
          }

          $allMsix | ForEach-Object { Write-Output "  找到 MSIX: $($_.FullName)" }

          $tmpDir = "./publish/${{ matrix.platform }}-msix"
          New-Item -ItemType Directory -Force -Path $tmpDir

          $allMsix | ForEach-Object { Copy-Item $_.FullName $tmpDir }

      - name: 签名所有 MSIX
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "SignTool.exe" -Recurse | Where-Object { $_.FullName -like "*\x64\*" } | Select-Object -First 1
          if (-not $signtool) {
              Write-Error "❌ 未找到 SignTool.exe"
              exit 1
          }

          $msixFiles = Get-ChildItem -Path "./publish/${{ matrix.platform }}-msix" -Filter "*.msix" -Recurse
          foreach ($msix in $msixFiles) {
              Write-Output "正在签名: $($msix.FullName)"
              & $signtool.FullName sign /fd SHA256 /f signing-cert.pfx /p ${{ secrets.CERTIFICATE_PASSWORD }} $msix.FullName
          }

      - name: 上传 MSIX
        uses: actions/upload-artifact@v4
        with:
          name: msix-${{ matrix.platform }}
          path: ./publish/${{ matrix.platform }}-msix/*.msix
  release:
    needs: [build-android, build-winapp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            android-apk-*/*-Signed.apk
            msix-*/*.msix
            DJDQfff_certificate.cer
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}