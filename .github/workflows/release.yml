name: Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 克隆 MyLibrary
        run: |
          cd ..
          git clone https://github.com/DJDQfff/MyLibrary.git MyLibrary

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet workload install android ios

      - name: 还原签名证书
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("${{ github.workspace }}\certificate.pfx", [Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}"))

      - name: 构建 Android APK
        run: |
          dotnet publish UnoApp/UnoApp/UnoApp.csproj `
            -f net10.0-android `
            -c Release `
            -p:AndroidPackageFormats=apk `
            -p:AndroidSigningKeyStore=${{ github.workspace }}\certificate.pfx `
            -p:AndroidSigningKeyPass=${{ secrets.CERTIFICATE_PASSWORD }} `
            -p:AndroidSigningStorePass=${{ secrets.CERTIFICATE_PASSWORD }} `
            -o ./publish/android

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./publish/android/*-Signed.apk

  build-winapp:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, x86, ARM64]
    env:
      Solution_Name: EroMangaManager.slnx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 克隆 MyLibrary
        run: |
          cd ..
          git clone https://github.com/DJDQfff/MyLibrary.git MyLibrary

      - name: 安装 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 设置 MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: 还原依赖
        run: msbuild $env:Solution_Name /t:Restore /p:Configuration=Release /p:Platform=${{ matrix.platform }}
        env:
          Configuration: Release
          Platform: ${{ matrix.platform }}

      - name: 生成证书文件用于分发
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("certificate.cer", [Convert]::FromBase64String("${{ secrets.CERTIFICATE_PUBLIC_KEY }}"))

      - name: 解码证书
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}")
          $certificatePath = "GitHubActionsWorkflow.pfx"
          [IO.File]::WriteAllBytes("$certificatePath", $pfx_cert_byte)

      - name: 构建并打包 MSIX
        run: msbuild $env:Solution_Name /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxBundle=Never /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx /p:PackageCertificatePassword=${{ secrets.CERTIFICATE_PASSWORD }} /p:AppxPackageDir=./publish/winapp/${{ matrix.platform }}/ /p:GenerateAppxPackageOnBuild=true
        env:
          Configuration: Release
          Platform: ${{ matrix.platform }}

      - name: 移除证书
        run: Remove-Item -path GitHubActionsWorkflow.pfx

      - name: 收集 MSIX
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "./publish/msix-files"
          Get-ChildItem -Recurse -Filter "*.msix" | ForEach-Object { Copy-Item $_.FullName "./publish/msix-files/" }

      - uses: actions/upload-artifact@v4
        with:
          name: msix-${{ matrix.platform }}
          path: ./publish/msix-files/*.msix

      - name: 上传证书
        uses: actions/upload-artifact@v4
        with:
          name: certificate
          path: certificate.cer

  release:
    needs: [build-android, build-winapp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            android-apk/*-Signed.apk
            msix-x64/*.msix
            msix-x86/*.msix
            msix-ARM64/*.msix
            certificate/*.cer
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}