name: Release All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 克隆 MyLibrary
        run: |
          cd ..
          git clone https://github.com/DJDQfff/MyLibrary.git MyLibrary

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet workload install android ios

      - name: 还原签名证书
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("${{ github.workspace }}\certificate.pfx", [Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}"))

      - name: 构建 Android APK
        run: |
          dotnet publish UnoApp/UnoApp/UnoApp.csproj `
            -f net10.0-android `
            -c Release `
            -p:AndroidPackageFormats=apk `
            -p:AndroidSigningKeyStore=${{ github.workspace }}\certificate.pfx `
            -p:AndroidSigningKeyPass=${{ secrets.CERTIFICATE_PASSWORD }} `
            -p:AndroidSigningStorePass=${{ secrets.CERTIFICATE_PASSWORD }} `
            -o ./publish/android

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./publish/android/*-Signed.apk

  build-winapp:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, x86, ARM64]
    env:
      Solution_Name: EroMangaManager.slnx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 克隆 MyLibrary
        run: |
          cd ..
          git clone https://github.com/DJDQfff/MyLibrary.git MyLibrary

      - name: 安装 .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 设置 MSBuild
        uses: microsoft/setup-msbuild@v1.3.1

      - name: 还原依赖
        run: msbuild $env:Solution_Name /t:Restore /p:Configuration=Release /p:Platform=${{ matrix.platform }}
        env:
          Configuration: Release
          Platform: ${{ matrix.platform }}

      - name: 解码证书
        run: |
          $pfx_cert_byte = [System.Convert]::FromBase64String("${{ secrets.CERTIFICATE_PFX }}")
          $currentPath = Join-Path -Path $env:GITHUB_WORKSPACE -ChildPath "GitHubActionsWorkflow.pfx"
          [IO.File]::WriteAllBytes("$currentPath", $pfx_cert_byte)

      - name: 生成证书文件
        shell: pwsh
        run: |
          $cert = New-Object System.Security.Cryptography.X509Certificates.X509Certificate2("GitHubActionsWorkflow.pfx", "${{ secrets.CERTIFICATE_PASSWORD }}")
          [System.IO.File]::WriteAllBytes("${{ github.workspace }}/certificate.cer", $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert))

      - name: 构建并打包 MSIX
        run: |
          msbuild $env:Solution_Name `
            /p:Configuration=Release `
            /p:Platform=${{ matrix.platform }} `
            /p:AppxBundle=Never `
            /p:GenerateAppxPackageOnBuild=true `
            /p:PackageCertificateKeyFile=GitHubActionsWorkflow.pfx `
            /p:PackageCertificatePassword=${{ secrets.CERTIFICATE_PASSWORD }}
        env:
          Configuration: Release
          Platform: ${{ matrix.platform }}

      - name: 移除证书
        run: Remove-Item -path GitHubActionsWorkflow.pfx

      - name: 收集所有 MSIX 文件
        shell: pwsh
        run: |
          Write-Output "正在全盘搜索所有 MSIX 文件..."
          $allMsix = Get-ChildItem -Path "D:\a\" -Filter "*.msix" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -notmatch "^(Main|Singleton)" }

          if (!$allMsix) {
              Write-Error "❌ 构建未生成任何 MSIX 文件，请检查 MSBuild 输出。"
              exit 1
          }
          
          $allMsix | ForEach-Object { Write-Output "  找到 MSIX: $($_.FullName)" }

          # 创建一个唯一的临时文件夹，用于存放本矩阵任务的产物
          $tmpDir = "./publish/${{ matrix.platform }}-msix"
          New-Item -ItemType Directory -Force -Path $tmpDir

          $allMsix | ForEach-Object {
              Copy-Item $_.FullName $tmpDir
          }

      - name: 上传证书
        uses: actions/upload-artifact@v4
        with:
          name: certificate
          path: ${{ github.workspace }}/certificate.cer

      - name: 上传 MSIX
        uses: actions/upload-artifact@v4
        with:
          name: msix-${{ matrix.platform }}
          path: ./publish/${{ matrix.platform }}-msix/*.msix

  release:
    needs: [build-android, build-winapp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            android-apk/*-Signed.apk
            msix-*/*.msix
            certificate/*.cer     
          name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}