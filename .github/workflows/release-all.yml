name: Release All

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      version_tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成版本号并打 Tag
        id: version
        run: |
          VERSION=$(date +'%Y.%-m.%-d')
          echo "version_tag=v${VERSION}" >> $GITHUB_OUTPUT
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

  build-winapp:
    needs: set-version
    uses: ./.github/workflows/release-winapp.yml
    with:
      version_tag: ${{ needs.set-version.outputs.version_tag }}

  release:
    needs: [set-version, build-winapp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.set-version.outputs.version_tag }}
          name: Release ${{ needs.set-version.outputs.version_tag }}
          files: msix-*/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}